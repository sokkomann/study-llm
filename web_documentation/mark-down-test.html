<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- sanitize -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex/dist/contrib/auto-render.min.js"></script>
    <script>
        window.onload = () => {
            function renderLLMResponse(response, element) {
                // 1. 수식 보호 전처리
                let fixedResponse = response
                    .replace(/\f/g, '\\frac') // \f 현상 복구
                    .replace(/\\/g, '\\\\')   // 모든 \를 \\로 보호
                    .replace(/\[/g, '\\\\[')  // [ 를 \\[ 로 보호
                    .replace(/\]/g, '\\\\]'); // ] 를 \\] 로 보호

                // 2. Markdown → HTML
                const rawHtml = marked.parse(fixedResponse);

                // 3. XSS 방지(보안)
                // 누군가, 글 대신 script코드를 보냈을 때 실행되는 것을 방지
                const safeHtml = DOMPurify.sanitize(rawHtml);
                element.innerHTML = safeHtml;

                // 4. KaTeX 렌더링
                renderMathInElement(element, {
                    delimiters: [
                        { left: "$$", right: "$$", display: true },
                        { left: "$", right: "$", display: false },
                        { left: "\\[", right: "\\]", display: true },
                        { left: "\\(", right: "\\)", display: false }
                    ],
                    throwOnError: false
                });
            }

            // 테스트할 원본 마크다운
            const response = `
연 수익률이 6%로 복리로 굴린다고 가정하면, 자산이 2배가 되는 시간 (t)는

[ (1.06)^t = 2 ]

[ t = \\frac{\\ln 2}{\\ln 1.06} ]

계산하면,

[ t \\approx \\frac{0.6931}{0.05827} \\approx 11.9 ]

따라서 **약 11.9년(대략 12년)** 걸립니다.
            `;

            const el = document.getElementById("output");
            renderLLMResponse(response.trim(), el);
        }
    </script>
</head>
<body>
    <div id="output"></div>
</body>
</html>
